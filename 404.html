    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Detectar el idioma del navegador del usuario
            const userLang = navigator.language || navigator.userLanguage || 'es';
            const langCode = userLang.toLowerCase().substring(0, 2);
            
            const titleEl = document.getElementById('error-title');
            const descEl = document.getElementById('error-desc');
            const btnEl = document.getElementById('error-btn');
            const langDisplay = document.getElementById('curr-lang-display');
            
            const aboutEl = document.getElementById('footer-link-about');
            const contactEl = document.getElementById('footer-link-contact');
            const privacyEl = document.getElementById('footer-link-privacy');
            const termsEl = document.getElementById('footer-link-terms');

            // Configurar traducciones basadas en el idioma
            if (langCode === 'en') {
                titleEl.textContent = "Page Not Found";
                descEl.textContent = "Sorry, the page you are looking for does not exist, has been removed, or moved to another URL.";
                btnEl.textContent = "Back to Home";
                btnEl.href = "/en/";
                langDisplay.textContent = "EN";
                
                aboutEl.textContent = "About Us";
                aboutEl.href = "/en/about/";
                contactEl.textContent = "Contact";
                contactEl.href = "/en/contact/";
                privacyEl.textContent = "Privacy Policy";
                privacyEl.href = "/en/privacy-policy/";
                termsEl.textContent = "Terms of Use";
                termsEl.href = "/en/terms-of-use/";
            } else if (langCode === 'zh') {
                titleEl.textContent = "页面未找到";
                descEl.textContent = "抱歉，您访问的页面不存在、已被删除或已被移动到其他链接。";
                btnEl.textContent = "返回首页";
                btnEl.href = "/zh/";
                langDisplay.textContent = "ZH";
                
                aboutEl.textContent = "关于我们";
                aboutEl.href = "/zh/guanyu-women/";
                contactEl.textContent = "联系我们";
                contactEl.href = "/zh/lianxi-women/";
                privacyEl.textContent = "隐私政策";
                privacyEl.href = "/zh/yinsi-zhengce/";
                termsEl.textContent = "使用条款";
                termsEl.href = "/zh/shiyong-tiaokuan/";
            } else if (langCode === 'ja') {
                titleEl.textContent = "ページが見つかりません";
                descEl.textContent = "申し訳ありませんが、お探しのページは存在しないか、削除されたか、別の場所に移動されました。";
                btnEl.textContent = "ホームに戻る";
                btnEl.href = "/ja/";
                langDisplay.textContent = "JA";
                
                aboutEl.textContent = "会社概要";
                aboutEl.href = "/ja/about/";
                contactEl.textContent = "お問い合わせ";
                contactEl.href = "/ja/contact/";
                privacyEl.textContent = "プライバシーポリシー";
                privacyEl.href = "/ja/privacy-policy/";
                termsEl.textContent = "利用規約";
                termsEl.href = "/ja/riyo-kiyaku/";
            }
        });
